<!DOCTYPE html>

<head>

<body>

<nav>
  <a href="/" class="nav-logo">WORKADULT.PRO</a>
  <div class="nav-links" id="navLinks">
    <a href="/#pricing">Тарифы</a>
    <a href="/#app">Приложение</a>
    <a href="/#model">Работа</a>

  <button class="burger"><span></span><span></span><span></span></button>
</nav>

<section style="padding-top:120px;background:#f5f5f5;min-height:100vh;">
  <div class="container">
    <div class="section-label">Поддержка</div>
    <div class="section-title">Задайте вопрос</div>
    <div class="section-desc" style="margin-bottom:48px;">Напишите нам — ответим в течение дня. Или напишите напрямую в Telegram.</div>

    <div style="display:flex;gap:16px;margin-bottom:48px;flex-wrap:wrap;">
      <a href="https://t.me/Workadult_feedback_bot" target="_blank" class="btn btn-black">💬 Написать в Telegram</a>
    </div>

    <div class="form-wrap" style="margin:0;max-width:680px;">
      <form onsubmit="submitQuestion(event)">
        <div class="form-group">
          <label>Ваше имя</label>
          <input type="text" name="name" placeholder="Как к вам обращаться">
        </div>
        <div class="form-group">
          <label>Ссылка на Chaturbate</label>
          <input type="text" name="chaturbate" placeholder="https://chaturbate.com/yourname">
        </div>
        <div class="form-group">
          <label>Ссылка на Stripchat</label>
          <input type="text" name="stripchat" placeholder="https://stripchat.com/yourname">
        </div>
        <div class="form-group">
          <label>Ваш ник в Telegram *</label>
          <input type="text" name="telegram" placeholder="@yourname" required>
        </div>
        <div class="form-group">
          <label>Ваш вопрос *</label>
          <textarea name="question" placeholder="Опишите ваш вопрос подробно..." required></textarea>
        </div>
        <button type="submit" class="btn btn-black" style="width:100%;justify-content:center;padding:18px;">Отправить</button>
      </form>
      <div class="form-success">✅ Вопрос получен! Мы ответим в Telegram в течение дня.</div>
    </div>
  </div>
</section>

<footer>
  <div class="container">
    <div class="footer-bottom">
      <a href="/" style="color:rgba(255,255,255,0.5);">← Workadult.pro</a>
      <span>@workadultpro</span>
    </div>
  </div>
</footer>
